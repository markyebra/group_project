<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}City of Laredo Portal{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }

        .topbar {
            background: #17375e;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
        }

        .header {
            background: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }

        .brand {
            font-weight: bold;
            color: #17375e;
            font-size: 20px;
        }

        .nav a {
            margin-left: 15px;
            text-decoration: none;
            color: #17375e;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        button {
            background: #c9a227;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }
    </style>

    {% block head %}{% endblock %}
</head>
<body>

    <div class="header">
        <div class="brand" style="display:flex; align-items:center; gap:10px;">
            <img src="{{ url_for('static', filename='img/uml01.png') }}" alt="City of Laredo" style="height:40px;">
            <span>Video Footage Request Portal</span>
        </div>
        <div class="nav">
            <a href="/">Home</a>
            <a href="{{ url_for('requestor_dashboard') }}">Dashboard</a>
            <a href="{{ url_for('new_request') }}">New Request</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}

</body>
</html>
